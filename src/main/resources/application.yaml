spring:
  application:
    name: blackjack-api

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: false

  datasource:
    url: jdbc:mysql://mysql:3306/blackjack?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: blackjack_user
    password: blackjack_pass
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    mongodb:
      uri: mongodb://admin:admin@mongodb:27017/blackjack_games?authSource=admin

  web:
    resources:
      static-locations: classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs
    enabled: true

server:
  port: 8080

logging:
  level:
    root: INFO
    com.blackjack: DEBUG